<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cafe</title>
    <link rel="stylesheet" href="activity.css" />
  </head>
  <body>
    <div class="페이지">
      <header>
        <div>
          <h2 class="카페">주문</h2>
            <div class="category-list">
            <button class="category active">커피/라떼</button>
            <button class="category">에이드</button>
            <button class="category">스무디</button>
            <button class="category">디저트</button>
        </div>
      </header>

      <section>
        <div class="컨테이너">
          <div class="카드">
            <div class="박스">
              <img class="이미지" src="./assets/Americano.png" />
              <div class="타이틀">아메리카노</div>
              <div class="가격">4,500원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Cafe_Latte.png" />
              <div class="타이틀">카페 라떼</div>
              <div class="가격">5,000원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Vanilla_Latte.png" />
              <div class="타이틀">바닐라 라떼</div>
              <div class="가격">5,500원</div>
            </div>
          </div>
          <div class="카드">
            <div class="박스">
              <img class="이미지" src="./assets/Dabang_Coffee.png" />
              <div class="타이틀">다방커피</div>
              <div class="가격">4,400원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Cold_Brew_Decaf.png" />
              <div class="타이틀">콜드브루 디카페인</div>
              <div class="가격">5,200원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Cold-Brew_Latte_Decaf.png" />
              <div class="타이틀">콜드브루 라떼</div>
              <div class="가격">5,800원</div>
            </div>
          </div>
          <div class="카드">
            <div class="박스">
              <img
                class="이미지"
                src="./assets/Cold_Brew_DolceLatte_Decaf.png"
              />
              <div class="타이틀">콜드브루 돌체라떼</div>
              <div class="가격">6,000원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Double_Chocolate_Latte.png" />
              <div class="타이틀">더블 초코 라떼</div>
              <div class="가격">6,500원</div>
            </div>
            <div class="박스">
              <img class="이미지" src="./assets/Real_Strawberry_Latte.png" />
              <div class="타이틀">리얼 딸기 라떼</div>
              <div class="가격">6,800원</div>
            </div>
          </div>
        </div>
      </section>

      <footer>
        <div>
          <div class="하단컨테이너">
            <div class="하단영역">
              <div class="총금액">
                총 금액 (₩)<span class="가격색상"> 5,000 </span>
              </div>
              <button class="결제버튼" type="button">주문 확인 후 결제</button
              ><br />
            </div>
            <div class="하단영역">
                <div class="주문수량"><span> 주문 수량 (개) </span>
                <span> 1 </span></div>
            <div class="버튼2"> 
                <button class="도움버튼" type ="button">도움 요청</button>
                <button class="처음버튼" type="button">처음 화면으로</button>
            </div>
           
        </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
