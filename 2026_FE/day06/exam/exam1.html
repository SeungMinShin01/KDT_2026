<!doctype html>

<html>
  <head>
    <!-- CSS 방법2 -->
    <style>
      h4 {
        color: blue;
      }
    </style>
    <!-- CSS 방법3 -->
    <link rel="stylesheet" href="exam1.css" />
  </head>

  <body>
    <!-- 
        HTML : 이동 가능한 텍스트 마크업 언어                                   EX] 뼈대
        JS   : 자바스크립트 프로그래밍 언어                                     EX] 동적( 이벤트 )
        CSS  : Cascading( 위에서 아래로 흐름 ) Style( 꾸미기 ) sheets( 덮는 )   EX] 옷                                                               
            -> 위에서 아래로 (HTML/XML) 꾸미기 시트를 덮는다.
    -->
    <!-- 1. CSS 적용하는 방법1 : 인라인( 마크업내 style 속성 이용 ) -->
    <h3 style="color: rgb(77, 22, 58)">CSS 방법 1</h3>
    <!-- h3 마크업 -->
    <h4>CSS방법2</h4>
    <!-- CSS 적용하는 방법2: <head> 마크업내 <style> 마크업 안에서 CSS 문법 작성 -->
    <h5>CSS방법3</h5>
    <!-- CSS 적용하는 방법3: .css 파일내 css문법 작성하고 <head> 마크업 안에서 .css파일 선언 -->
    <h6>CSS 선택자1</h6>
    <h6 class="구역1">CSS 선택자2</h6>
    <h6 id="구역2">CSS 선택자3</h6>
    <!-- 주의할점 : 하위요소 마크업 작성시 tab 탭 -->
    <div>
      <!-- div의 부모요소 = body , 자식요소 = h3 -->
      <h3>학생명단</h3>
      <!-- h3의 부모요소 = div , 자식요소 = X-->
      <ol>
        <!-- ol의 부모요소 = div , 자식요소 = li-->
        <li>유재석</li>
        <!-- li의 부모요소 = ol , 자식요소 = X -->
        <li><h3>강호동</h3></li>
      </ol>
    </div>

    <h2>CSS 텍스트 주요 속성</h2>
    <h1 class="title">강아지</h1>
    <div class="content">
      유재석 개는 중형 동물이자 가장 널리 분포하며 개체 수가 가장 많은 지상 동물
      중 하나이며 가축화된 회색늑대이다. 개는 인류가 최초로 가축으로 삼은 동물로
      알려져 있으며, 역사적으로 반려견, 사냥견으로서 길러 왔다.
    </div>
    <p class="작성자">위키백과</p>
  </body>
</html>
